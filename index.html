<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VETO AI</title>

<style>
body{
font-family: sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

#chat{
height:70vh;
overflow-y:auto;
padding:20px;
background:white;
}

.message{
margin:10px 0;
}

.user{
color:#333;
}

.ai{
color:#0066ff;
}

#inputArea{
display:flex;
padding:10px;
background:#eee;
}

#userInput{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
}
</style>

</head>

<body>

<h2 style="text-align:center">VETO AI 相談</h2>

<div id="chat"></div>

<div id="inputArea">
<input id="userInput" placeholder="相談内容を入力">
<button onclick="sendMessage()">送信</button>
</div>

<script>

let messageCount = 0;
const FREE_LIMIT = 3;

function addMessage(text, className){

const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = "message " + className;
div.textContent = text;

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

}

async function sendMessage(){

const input = document.getElementById("userInput");
const message = input.value.trim();

if(!message) return;

addMessage("あなた: " + message,"user");

input.value="";

messageCount++;

if(messageCount > FREE_LIMIT){

addMessage(
"🤖 VETO AI診断はここまでです。\n\n詳しいAI改善プランを作成します。\n\nAIコンサル診断 ¥1000\n\nhttps://example.com",
"ai"
);

return;

}

try{

const res = await fetch("/api/consult",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data = await res.json();

addMessage("VETO AI: " + data.reply,"ai");

}catch(e){

addMessage("AIエラー","ai");

}

}

</script>

</body>
</html>
