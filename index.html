<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VETO TEST</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
padding:40px;
}

#chat{
border:1px solid #333;
height:300px;
overflow:auto;
padding:10px;
margin-bottom:10px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
}
</style>

</head>

<body>

<h1>VETO AI TEST</h1>

<div id="chat"></div>

<input id="msg" placeholder="AI導入相談を書く">

<button onclick="sendMsg()">送信</button>

<script>

async function sendMsg(){

const input = document.getElementById("msg");
const chat = document.getElementById("chat");

const text = input.value;

chat.innerHTML += "<div>YOU: "+text+"</div>";

const res = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await res.json();

console.log(data);

let reply = "AIエラー";

if(data.reply){
reply = data.reply;
}

chat.innerHTML += "<div>AI: "+reply+"</div>";

input.value="";

}

</script>
</body>
</html>
