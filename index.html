<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETO — NOと言える、唯一の外部脳</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Noto+Sans+JP:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#090909;
--surface:#111;
--card:#161616;
--border:#222;
--accent:#d4870a;
--text:#ede8dc;
--muted:#666;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Noto Sans JP',sans-serif;
}

nav{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
background:#000;
border-bottom:1px solid #222;
}

.logo{
font-family:'Barlow Condensed',sans-serif;
font-size:28px;
color:var(--accent);
font-weight:900;
}

section{
max-width:900px;
margin:auto;
padding:80px 20px;
}

h1{
font-size:48px;
font-weight:900;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
}

p{
color:#aaa;
line-height:1.7;
}

.hero{
text-align:center;
padding-top:120px;
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:30px;
border-radius:6px;
margin-top:30px;
}

/* CHAT */

.chat-box{
height:350px;
overflow:auto;
background:#0d0d0d;
border:1px solid #333;
padding:15px;
font-size:14px;
}

.user{
color:#fff;
margin-bottom:10px;
}

.ai{
color:#6fa8ff;
margin-bottom:15px;
}

.input-area{
display:flex;
margin-top:10px;
}

input{
flex:1;
padding:10px;
border:none;
background:#111;
color:#fff;
}

button{
width:80px;
background:var(--accent);
border:none;
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.8;
}

</style>
</head>

<body>

<nav>
<div class="logo">VETO</div>
</nav>


<section class="hero">

<h1>NOと言える、唯一の外部脳</h1>

<p>
AIがあなたの意思決定をサポートする  
外部ブレインシステム
</p>

</section>



<section>

<h2>VETOとは</h2>

<p>
VETOは「判断支援AI」です。  
経営、効率化、AI導入などの相談をAIが整理し  
最適な意思決定をサポートします。
</p>

</section>



<section>

<h2>料金</h2>

<div class="card">

<p>

AI相談  
無料：1000相談まで  

1000件突破後  
企業導入プランへ

</p>

</div>

</section>



<section>

<h2>AI相談</h2>

<div class="card">

<div id="chat" class="chat-box"></div>

<div class="input-area">
<input id="input" placeholder="相談を書く">
<button onclick="send()">送信</button>
</div>

</div>

</section>



<script>

const chat = document.getElementById("chat");

function addUser(text){

chat.innerHTML += `<div class="user">あなた: ${text}</div>`

}

function addAI(text){

chat.innerHTML += `<div class="ai">VETO: ${text}</div>`

chat.scrollTop = chat.scrollHeight

}


async function send(){

const input = document.getElementById("input")

const message = input.value

if(!message) return

addUser(message)

input.value=""

try{

const res = await fetch("/api/gemini",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
})

const data = await res.json()

addAI(data.text)

}catch(e){

addAI("AIエラー")

}

}

</script>

</body>
</html>
